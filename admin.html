<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcroSport - Գերհզոր Ադմին Վահանակ</title>
    <link href="https://fonts.googleapis.com/css2?family=Armenian+Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Armenian', sans-serif; background: #f4f4f9; padding: 10px; margin: 0; }
        header { background: #1a1a1a; color: #ffcc00; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #login-box { max-width: 350px; margin: 80px auto; background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #admin-panel { display: none; max-width: 1300px; margin: 10px auto; }
        .section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { border-bottom: 2px solid #ffcc00; padding-bottom: 8px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Կառավարման վահանակ */
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .filter-btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: white; border: 1px solid #ccc; transition: 0.3s; }
        .filter-btn.active { background: #ffcc00; border-color: #1a1a1a; }
        .date-picker { padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; font-family: inherit; }

        /* Աղյուսակ */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; font-size: 14px; }
        th { background: #1a1a1a; color: #ffcc00; position: sticky; top: 0; }
        
        .student-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid #ffcc00; cursor: pointer; }
        .att-radio { transform: scale(1.4); cursor: pointer; accent-color: #ffcc00; }
        
        /* Վճարման կարգավիճակ */
        .pay-status { padding: 8px; border-radius: 8px; font-weight: bold; width: 100%; border: 2px solid #ccc; cursor: pointer; }
        .paid { border-color: #28a745; background: #e8f5e9; }
        .unpaid { border-color: #dc3545; background: #ffebee; }

        /* Ավելացնելու ֆորմա */
        .add-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .add-form input, .add-form select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .btn-add { background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 6px; }

        .archive-btn { background: #1a1a1a; color: #ffcc00; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header>AcroSport Admin System</header>

    <div id="login-box">
        <h2>Մուտք Ադմին</h2>
        <input type="password" id="admin-pass" placeholder="Գաղտնաբառ" style="width:90%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
        <button id="login-btn" style="width:96%; padding:12px; background:#1a1a1a; color:#ffcc00; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ՄՈՒՏՔ</button>
    </div>

    <div id="admin-panel">
        <div class="section">
            <h3>Ավելացնել Աշակերտ</h3>
            <div class="add-form">
                <input type="text" id="add-parent" placeholder="Ծնողի անուն">
                <input type="text" id="add-child" placeholder="Երեխայի անուն">
                <input type="number" id="add-age" placeholder="Տարիք">
                <input type="tel" id="add-phone" placeholder="Հեռախոս">
                <select id="add-day">
                    <option value="Երկուշաբթի">Երկուշաբթի</option>
                    <option value="Չորեքշաբթի">Չորեքշաբթի</option>
                    <option value="Ուրբաթ">Ուրբաթ</option>
                </select>
                <select id="add-gym">
                    <option value="Դավթաշեն">Դավթաշեն</option>
                    <option value="Այգեկ">Այգեկ</option>
                    <option value="Նոր Գեղի">Նոր Գեղի</option>
                </select>
                <input type="hidden" id="add-time" value="17:30">
                <button class="btn-add" id="manual-add-btn">ԱՎԵԼԱՑՆԵԼ</button>
            </div>
        </div>

        <div class="section">
            <h3>Հաճախումների և Վճարների Մատյան 
                <button class="archive-btn" onclick="archiveMonthlyPayments()">🔄 Փակել Ամիսը</button>
            </h3>
            
            <div class="controls">
                <strong>Դահլիճ՝</strong>
                <button class="filter-btn active" onclick="setGym('all')">Բոլորը</button>
                <button class="filter-btn" onclick="setGym('Դավթաշեն')">Դավթաշեն</button>
                <button class="filter-btn" onclick="setGym('Այգեկ')">Այգեկ</button>
                <button class="filter-btn" onclick="setGym('Նոր Գեղի')">Նոր Գեղի</button>
                
                <span style="margin-left: 15px;"><strong>Ամսաթիվ՝</strong></span>
                <input type="date" id="attendance-date" class="date-picker">
                
                <button class="filter-btn" style="background:#28a745; color:white;" id="save-attendance-btn">ՊԱՀՊԱՆԵԼ ՀԱՃԱԽՈՒՄՆԵՐԸ</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Նկար</th>
                            <th>Երեխա</th>
                            <th>Օր / Ժամ</th>
                            <th>Դահլիճ</th>
                            <th>Ներկա (Ն)</th>
                            <th>Բացակա (Բ)</th>
                            <th>Վճարում</th>
                            <th>Գործողություն</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, remove, get, set } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsOaBKfyOfLkCq8rX6tKaaRMLIdLS4w0Y",
            authDomain: "acrosport-bdd97.firebaseapp.com",
            projectId: "acrosport-bdd97",
            databaseURL: "https://acrosport-bdd97-default-rtdb.firebaseio.com",
            storageBucket: "acrosport-bdd97.firebasestorage.app",
            messagingSenderId: "23545482019",
            appId: "1:23545482019:web:055ec5ff5183264852da96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedGym = 'all';
        const dateInput = document.getElementById('attendance-date');
        dateInput.value = new Date().toISOString().split('T')[0];

        // ՄՈՒՏՔԻ ՍՏՈՒԳՈՒՄ
        document.getElementById('login-btn').addEventListener('click', () => {
            if(document.getElementById('admin-pass').value === "Acro2026") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadMainData();
            } else alert("Սխալ գաղտնաբառ:");
        });

        // ՖԻԼՏՐԻ ՖՈՒՆԿՑԻԱ
        window.setGym = (gym) => {
            selectedGym = gym;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
            loadMainData();
        };

        // ՀԻՄՆԱԿԱՆ ՏՎՅԱԼՆԵՐԻ ԲԵՌՆՈՒՄ
        async function loadMainData() {
            const selectedDate = dateInput.value;
            const attSnap = await get(ref(db, 'attendance/' + selectedDate));
            const dailyAttendance = attSnap.exists() ? attSnap.val() : {};

            onValue(ref(db, 'registrations'), (snapshot) => {
                const tbody = document.getElementById('main-table-body');
                tbody.innerHTML = "";
                
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    const id = childSnapshot.key;

                    if (selectedGym === 'all' || data.gym_location === selectedGym) {
                        const isPresent = dailyAttendance[id] === "Ներկա" ? "checked" : "";
                        const isAbsent = dailyAttendance[id] === "Բացակա" ? "checked" : "";
                        const payStatus = data.payment || "unpaid";

                        tbody.innerHTML += `
                            <tr>
                                <td><img src="${data.child_photo || 'https://via.placeholder.com/50'}" class="student-img" onclick="window.open(this.src)"></td>
                                <td style="text-align:left;"><b>${data.child_name}</b><br><small>${data.phone}</small></td>
                                <td>${data.visit_day}<br>${data.visit_time}</td>
                                <td>${data.gym_location}</td>
                                <td><input type="radio" name="att-${id}" value="Ներկա" ${isPresent} class="att-radio"></td>
                                <td><input type="radio" name="att-${id}" value="Բացակա" ${isAbsent} class="att-radio"></td>
                                <td>
                                    <select class="pay-status ${payStatus}" onchange="updatePayment('${id}', this.value)">
                                        <option value="unpaid" ${payStatus === 'unpaid' ? 'selected' : ''}>Չվճարված</option>
                                        <option value="paid" ${payStatus === 'paid' ? 'selected' : ''}>Վճարված</option>
                                    </select>
                                </td>
                                <td><button class="delete-btn" onclick="deleteStudent('${id}')">🗑️</button></td>
                            </tr>
                        `;
                    }
                });
            });
        }

        // ՀԱՃԱԽՈՒՄՆԵՐԻ ՊԱՀՊԱՆՈՒՄ (Ամեն օրվա համար առանձին)
        document.getElementById('save-attendance-btn').addEventListener('click', () => {
            const date = dateInput.value;
            const attendanceData = {};
            document.querySelectorAll('.att-radio:checked').forEach(radio => {
                const id = radio.name.replace('att-', '');
                attendanceData[id] = radio.value;
            });

            set(ref(db, 'attendance/' + date), attendanceData).then(() => {
                alert(date + " ամսաթվի հաճախումները պահպանվեցին:");
            });
        });

        // ՎՃԱՐՄԱՆ ԹԱՐՄԱՑՈՒՄ
        window.updatePayment = (id, status) => {
            update(ref(db, 'registrations/' + id), { payment: status });
        };

        // ԱՇԱԿԵՐՏԻ ՋՆՋՈՒՄ
        window.deleteStudent = (id) => {
            if(confirm("Համոզվա՞ծ եք, որ ուզում եք ջնջել այս աշակերտին:")) {
                remove(ref(db, 'registrations/' + id));
            }
        };

        // ԱՄՍՎԱ ՎՃԱՐՈՒՄՆԵՐԻ ԱՐԽԻՎԱՑՈՒՄ ԵՎ ԶՐՈՅԱՑՈՒՄ
        window.archiveMonthlyPayments = async () => {
            const currentMonth = new Date().toISOString().slice(0, 7);
            if(!confirm(currentMonth + " ամսվա վճարումները կարխիվացվեն և բոլորը կդառնան «Չվճարված»։ Շարունակե՞լ։")) return;

            const snapshot = await get(ref(db, 'registrations'));
            if(snapshot.exists()) {
                const updates = {};
                const archive = {};
                snapshot.forEach(child => {
                    const id = child.key;
                    const data = child.val();
                    archive[id] = { name: data.child_name, status: data.payment || 'unpaid' };
                    updates[`registrations/${id}/payment`] = "unpaid";
                });
                await set(ref(db, 'payments_archive/' + currentMonth), archive);
                await update(ref(db), updates);
                alert("Ամիսը փակվեց հաջողությամբ։");
            }
        };

        // ՁԵՌՔՈՎ ԱՎԵԼԱՑՆԵԼ
        document.getElementById('manual-add-btn').addEventListener('click', () => {
            const gym = document.getElementById('add-gym').value;
            let time = (gym === "Այգեկ" || gym === "Նոր Գեղի") ? "15:00" : "17:30";
            
            const newData = {
                parent_name: document.getElementById('add-parent').value,
                child_name: document.getElementById('add-child').value,
                child_age: document.getElementById('add-age').value,
                phone: document.getElementById('add-phone').value,
                visit_day: document.getElementById('add-day').value,
                visit_time: time,
                gym_location: gym,
                payment: "unpaid",
                child_photo: "",
                timestamp: new Date().toLocaleString()
            };

            if(newData.child_name && newData.phone) {
                push(ref(db, 'registrations'), newData).then(() => {
                    alert("Աշակերտը ավելացվեց:");
                    document.querySelectorAll('.add-form input').forEach(i => i.value = "");
                });
            } else alert("Լրացրեք անունը և հեռախոսը:");
        });

        dateInput.addEventListener('change', loadMainData);
    </script>
</body>
</html>
