<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>AcroSport Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Armenian+Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Armenian', sans-serif; background: #f4f4f9; padding: 20px; margin: 0; }
        header { background: #1a1a1a; color: #ffcc00; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; }
        #login-box { max-width: 350px; margin: 80px auto; background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #admin-panel { display: none; max-width: 1200px; margin: 20px auto; }
        .section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { border-bottom: 2px solid #ffcc00; padding-bottom: 8px; margin-top: 0; }
        .add-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        .btn-add { background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; min-width: 900px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: #1a1a1a; color: #ffcc00; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; }
        button#login-btn { width: 100%; background: #1a1a1a; color: #ffcc00; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        
        /* Նկարի ոճը */
        .student-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid #ffcc00; background: #eee; }
        .btn-attendance { padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 2px; }
        .present { background: #28a745; color: white; }
        .absent { background: #dc3545; color: white; }
        .pay-status { padding: 5px; border-radius: 5px; font-size: 13px; }
        .paid { border: 2px solid #28a745; background: #e8f5e9; }
        .unpaid { border: 2px solid #ff4d4d; background: #ffebee; }
    </style>
</head>
<body>

    <header>AcroSport Admin Panel</header>

    <div id="login-box">
        <h2>Մուտք</h2>
        <input type="password" id="admin-pass" placeholder="Գաղտնաբառ">
        <button id="login-btn">Մուտք Գործել</button>
    </div>

    <div id="admin-panel">
        <div class="section">
            <h3>Ավելացնել նոր աշակերտ (Ձեռքով)</h3>
            <div class="add-form">
                <input type="text" id="add-parent" placeholder="Ծնող">
                <input type="text" id="add-child" placeholder="Երեխա">
                <input type="number" id="add-age" placeholder="Տարիք">
                <input type="tel" id="add-phone" placeholder="Հեռախոս">
                <select id="add-day">
                    <option value="Երկուշաբթի">Երկուշաբթի</option>
                    <option value="Չորեքշաբթի">Չորեքշաբթի</option>
                    <option value="Ուրբաթ">Ուրբաթ</option>
                </select>
                <select id="add-time">
                    <option value="15:00">15:00</option>
                    <option value="17:30">17:30</option>
                </select>
                <select id="add-gym">
                    <option value="Դավթաշեն">Դավթաշեն</option>
                    <option value="Այգեկ">Այգեկ</option>
                    <option value="Նոր Գեղի">Նոր Գեղի</option>
                </select>
                <button class="btn-add" id="manual-add-btn">Ավելացնել</button>
            </div>
        </div>

        <div class="section">
            <h3>Գրանցվածների Ցուցակ</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Նկար</th>
                            <th>Ծնող</th>
                            <th>Երեխա</th>
                            <th>Տարիք</th>
                            <th>Հեռախոս</th>
                            <th>Օր/Ժամ</th>
                            <th>Դահլիճ</th>
                            <th>Ներկա/Բացակա</th>
                            <th>Վարձավճար</th>
                            <th>Ջնջել</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
        <a href="index.html" style="text-decoration:none; color:#666;">← Վերադառնալ կայք</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsOaBKfyOfLkCq8rX6tKaaRMLIdLS4w0Y",
            authDomain: "acrosport-bdd97.firebaseapp.com",
            projectId: "acrosport-bdd97",
            databaseURL: "https://acrosport-bdd97-default-rtdb.firebaseio.com",
            storageBucket: "acrosport-bdd97.firebasestorage.app",
            messagingSenderId: "23545482019",
            appId: "1:23545482019:web:055ec5ff5183264852da96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Ավտոմատ ժամի փոփոխություն ադմինում
        const gymInp = document.getElementById('add-gym');
        const timeInp = document.getElementById('add-time');
        gymInp.addEventListener('change', () => {
            if (gymInp.value === "Այգեկ" || gymInp.value === "Նոր Գեղի") timeInp.value = "15:00";
            else if (gymInp.value === "Դավթաշեն") timeInp.value = "17:30";
        });

        document.getElementById('login-btn').addEventListener('click', () => {
            if(document.getElementById('admin-pass').value === "Acro2026") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                fetchData();
            } else alert("Սխալ է:");
        });

        function fetchData() {
            onValue(ref(db, 'registrations'), (snapshot) => {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = "";
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    const id = childSnapshot.key;
                    
                    const attendanceStatus = data.attendance || "---";
                    const paymentStatus = data.payment || "unpaid";

                    // Այստեղ ստուգում ենք data.child_photo-ն
                    const studentImg = data.child_photo 
                        ? `<img src="${data.child_photo}" class="student-img" onclick="window.open(this.src)">` 
                        : `<div class="student-img" style="display:flex;align-items:center;justify-content:center;font-size:10px;background:#ddd;">No Pic</div>`;

                    tbody.innerHTML += `
                        <tr>
                            <td>${studentImg}</td>
                            <td>${data.parent_name}</td>
                            <td>${data.child_name}</td>
                            <td>${data.child_age}</td>
                            <td>${data.phone}</td>
                            <td>${data.visit_day} / ${data.visit_time}</td>
                            <td>${data.gym_location || '-'}</td>
                            <td>
                                <button class="btn-attendance present" onclick="markAttendance('${id}', 'Ներկա')">Ն</button>
                                <button class="btn-attendance absent" onclick="markAttendance('${id}', 'Բացակա')">Բ</button>
                                <div style="font-size:10px; margin-top:5px;">Կարգավիճակ: <b>${attendanceStatus}</b></div>
                            </td>
                            <td>
                                <select class="pay-status ${paymentStatus}" onchange="updatePayment('${id}', this.value)">
                                    <option value="unpaid" ${paymentStatus === 'unpaid' ? 'selected' : ''}>Չվճարված</option>
                                    <option value="paid" ${paymentStatus === 'paid' ? 'selected' : ''}>Վճարված</option>
                                </select>
                            </td>
                            <td><button class="delete-btn" onclick="deleteData('${id}')">Ջնջել</button></td>
                        </tr>`;
                });
            });
        }

        window.markAttendance = (id, status) => { update(ref(db, 'registrations/' + id), { attendance: status }); };
        window.updatePayment = (id, status) => { update(ref(db, 'registrations/' + id), { payment: status }); };
        window.deleteData = (id) => { if(confirm("Ջնջե՞լ")) remove(ref(db, 'registrations/' + id)); };

        document.getElementById('manual-add-btn').addEventListener('click', () => {
            const newData = {
                parent_name: document.getElementById('add-parent').value,
                child_name: document.getElementById('add-child').value,
                child_age: document.getElementById('add-age').value,
                phone: document.getElementById('add-phone').value,
                visit_day: document.getElementById('add-day').value,
                visit_time: document.getElementById('add-time').value,
                gym_location: document.getElementById('add-gym').value,
                payment: "unpaid",
                attendance: "---",
                child_photo: "", // Ձեռքով ավելացնելիս նկարը դատարկ է մնում
                timestamp: new Date().toLocaleString()
            };
            if(newData.parent_name && newData.child_name) {
                push(ref(db, 'registrations'), newData).then(() => {
                    alert("Ավելացվեց:");
                    document.querySelectorAll('.add-form input').forEach(i => i.value = "");
                });
            }
        });
    </script>
</body>
</html>
