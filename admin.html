<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcroSport Admin - Գերհզոր Մատյան</title>
    <link href="https://fonts.googleapis.com/css2?family=Armenian+Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Armenian', sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        header { background: #1a1a1a; color: #ffcc00; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; }
        #admin-panel { display: none; max-width: 1250px; margin: 10px auto; }
        .section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Ֆիլտրեր */
        .controls { display: flex; gap: 8px; flex-wrap: wrap; background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; align-items: center; border: 1px solid #ddd; }
        .filter-btn { padding: 8px 15px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; background: white; font-weight: bold; }
        .filter-btn.active { background: #ffcc00; border-color: #1a1a1a; }
        
        /* Աղյուսակ */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: center; font-size: 14px; }
        th { background: #1a1a1a; color: #ffcc00; }
        .student-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid #ffcc00; }

        /* Վճարման կարգավիճակի ոճերը */
        .pay-select { padding: 6px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 110px; }
        .paid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .unpaid { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Modal Պատմություն */
        #history-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .history-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }
        .hist-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }

        .btn-add { background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .save-all-btn { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-left: auto; }
    </style>
</head>
<body>

    <header>AcroSport - Կառավարման Համակարգ</header>

    <div id="login-box" style="max-width:350px; margin:80px auto; text-align:center; background:white; padding:25px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <input type="password" id="admin-pass" placeholder="Գաղտնաբառ" style="width:90%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
        <button id="login-btn" style="width:96%; padding:10px; background:#1a1a1a; color:#ffcc00; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">ՄՈՒՏՔ</button>
    </div>

    <div id="admin-panel">
        <div class="section">
            <h3>Ավելացնել Աշակերտ</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;">
                <input type="text" id="add-parent" placeholder="Ծնող">
                <input type="text" id="add-child" placeholder="Երեխա">
                <input type="tel" id="add-phone" placeholder="Հեռախոս">
                <select id="add-gym">
                    <option value="Դավթաշեն">Դավթաշեն</option>
                    <option value="Այգեկ">Այգեկ</option>
                    <option value="Նոր Գեղի">Նոր Գեղի</option>
                </select>
                <input type="file" id="add-photo" accept="image/*">
                <button class="btn-add" id="manual-add-btn">ԱՎԵԼԱՑՆԵԼ</button>
            </div>
        </div>

        <div class="section">
            <div class="controls">
                <strong>Զտել՝</strong>
                <button class="filter-btn active" data-gym="all">Բոլորը</button>
                <button class="filter-btn" data-gym="Դավթաշեն">Դավթաշեն</button>
                <button class="filter-btn" data-gym="Այգեկ">Այգեկ</button>
                <button class="filter-btn" data-gym="Նոր Գեղի">Նոր Գեղի</button>
                <input type="date" id="attendance-date" style="padding:7px; border-radius:5px; border:1px solid #ccc; margin-left:15px;">
                <button class="save-all-btn" id="save-attendance">ՊԱՀՊԱՆԵԼ Ն/Բ</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Նկար</th>
                            <th>Աշակերտ</th>
                            <th>Դահլիճ</th>
                            <th>Ներկա / Բացակա</th>
                            <th>Վճարում</th>
                            <th>Գործողություն</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body"></tbody>
                </table>
            </div>
        </div>
        <button id="archive-month-btn" style="padding:12px; background:#ff4d4d; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🔄 Փակել Ամիսը (Արխիվացնել)</button>
    </div>

    <div id="history-overlay">
        <div class="history-content">
            <span onclick="document.getElementById('history-overlay').style.display='none'" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
            <h3 id="hist-student-name"></h3>
            <div id="history-data"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, set, update, push, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsOaBKfyOfLkCq8rX6tKaaRMLIdLS4w0Y",
            authDomain: "acrosport-bdd97.firebaseapp.com",
            projectId: "acrosport-bdd97",
            databaseURL: "https://acrosport-bdd97-default-rtdb.firebaseio.com",
            storageBucket: "acrosport-bdd97.firebasestorage.app",
            messagingSenderId: "23545482019",
            appId: "1:23545482019:web:055ec5ff5183264852da96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedGym = 'all';
        const dateInput = document.getElementById('attendance-date');
        dateInput.value = new Date().toISOString().split('T')[0];

        // ԼՈԳԻՆ
        document.getElementById('login-btn').addEventListener('click', () => {
            if(document.getElementById('admin-pass').value === "Acro2026") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadMainTable();
            }
        });

        // ՖԻԼՏՐ
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedGym = btn.getAttribute('data-gym');
                loadMainTable();
            });
        });

        // ԱՂՅՈՒՍԱԿԻ ԲԵՌՆՈՒՄ
        async function loadMainTable() {
            const date = dateInput.value;
            const attSnap = await get(ref(db, 'attendance/' + date));
            const dailyData = attSnap.exists() ? attSnap.val() : {};

            onValue(ref(db, 'registrations'), (snapshot) => {
                const tbody = document.getElementById('main-table-body');
                tbody.innerHTML = "";
                snapshot.forEach(child => {
                    const data = child.val();
                    const id = child.key;

                    if(selectedGym === 'all' || data.gym_location === selectedGym) {
                        const isN = dailyData[id] === "Ներկա" ? "checked" : "";
                        const isB = dailyData[id] === "Բացակա" ? "checked" : "";
                        const pStatus = data.payment || "unpaid";

                        tbody.innerHTML += `
                            <tr>
                                <td><img src="${data.child_photo || 'https://via.placeholder.com/50'}" class="student-img"></td>
                                <td><b>${data.child_name}</b></td>
                                <td>${data.gym_location}</td>
                                <td>
                                    <input type="radio" name="att-${id}" value="Ներկա" ${isN}> Ն
                                    <input type="radio" name="att-${id}" value="Բացակա" ${isB}> Բ
                                </td>
                                <td>
                                    <select class="pay-select ${pStatus}" onchange="updatePayStatus('${id}', this.value)">
                                        <option value="unpaid" ${pStatus==='unpaid'?'selected':''}>Չվճարված</option>
                                        <option value="paid" ${pStatus==='paid'?'selected':''}>Վճարված</option>
                                    </select>
                                </td>
                                <td>
                                    <button onclick="showHistory('${id}', '${data.child_name}')">📋</button>
                                    <button onclick="delStud('${id}')">🗑️</button>
                                </td>
                            </tr>
                        `;
                    }
                });
            });
        }

        // ՎՃԱՐՄԱՆ ԹԱՐՄԱՑՈՒՄ (Միշտ պահվում է բազայում)
        window.updatePayStatus = (id, val) => {
            update(ref(db, `registrations/${id}`), { payment: val });
        };

        // ՊԱՀՊԱՆԵԼ Ն/Բ
        document.getElementById('save-attendance').addEventListener('click', () => {
            const date = dateInput.value;
            const updates = {};
            document.querySelectorAll('input[type="radio"]:checked').forEach(r => {
                updates[r.name.replace('att-', '')] = r.value;
            });
            set(ref(db, 'attendance/' + date), updates).then(() => alert("Պահպանվեց:"));
        });

        // ԱՎԵԼԱՑՆԵԼ ՆՈՐՈՒՆ
        document.getElementById('manual-add-btn').addEventListener('click', () => {
            const file = document.getElementById('add-photo').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const newData = {
                    child_name: document.getElementById('add-child').value,
                    parent_name: document.getElementById('add-parent').value,
                    phone: document.getElementById('add-phone').value,
                    gym_location: document.getElementById('add-gym').value,
                    payment: "unpaid",
                    child_photo: reader.result
                };
                push(ref(db, 'registrations'), newData).then(() => alert("Ավելացվեց:"));
            };
            if(file) reader.readAsDataURL(file);
            else alert("Ընտրեք նկար:");
        });

        // ՊԱՏՄՈՒԹՅՈՒՆ
        window.showHistory = async (id, name) => {
            document.getElementById('history-overlay').style.display = 'flex';
            document.getElementById('hist-student-name').innerText = name;
            const attSnap = await get(ref(db, 'attendance'));
            let html = "";
            if(attSnap.exists()) {
                const all = attSnap.val();
                Object.keys(all).reverse().forEach(date => {
                    if(all[date][id]) html += `<div class="hist-row"><span>${date}</span> <b>${all[date][id]}</b></div>`;
                });
            }
            document.getElementById('history-data').innerHTML = html || "Պատմություն չկա:";
        };

        // ԱՄՍՎԱ ՓԱԿՈՒՄ (ԱՐԽԻՎԱՑՈՒՄ)
        document.getElementById('archive-month-btn').addEventListener('click', async () => {
            const month = new Date().toISOString().slice(0, 7);
            if(!confirm(month + " ամիսը կփակվի, և բոլոր վճարումները կդառնան «Չվճարված»:")) return;
            
            const snap = await get(ref(db, 'registrations'));
            const archive = {};
            const updates = {};
            snap.forEach(c => {
                archive[c.key] = { name: c.val().child_name, status: c.val().payment };
                updates[`registrations/${c.key}/payment`] = "unpaid";
            });
            await set(ref(db, `payments_archive/${month}`), archive);
            await update(ref(db), updates);
            alert("Ամիսը հաջողությամբ փակվեց:");
        });

        window.delStud = (id) => { if(confirm("Ջնջե՞լ")) remove(ref(db, `registrations/${id}`)); };
        dateInput.addEventListener('change', loadMainTable);
    </script>
</body>
</html>
