<!DOCTYPE html>
<html lang="hy">
<head>
<link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" type="image/jpeg" href="logo.jpg">

    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcroSport - Գրանցում</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Armenian+Noto+Sans&display=swap" rel="stylesheet">
    <style>
        /* Տառատեսակների միացում */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Noto+Sans+Armenian:wght@400;700&display=swap');
    
        :root {
            --main-bg: #0a0a0a;      /* Մուգ սև ֆոն */
            --card-bg: #161616;      /* Ֆորմայի ֆոնը */
            --accent: #ffcc00;       /* Դեղին շեշտադրում կոճակի համար */
            --text-white: #ffffff;
            --text-muted: #a0a0a0;
        }
    
        body { 
            font-family: 'Noto Sans Armenian', sans-serif; 
            background-color: var(--main-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: var(--text-white); 
        }
    
        /* HEADER & LOGO SECTION */
        header { 
            background-color: #000; 
            width: 100%; 
            padding: 60px 0 80px 0; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 1px solid #222;
        }
    
        .logo-container {
            font-family: 'Montserrat', sans-serif;
            display: inline-block;
            text-align: center;
        }
    
        .acro-text {
            font-size: 85px; 
            font-weight: 700;
            letter-spacing: 10px;
            position: relative;
            line-height: 1;
            color: #ffffff; /* ՍՊԻՏԱԿ ՏԵՔՍՏ */
        }
    
        /* ՍՊԻՏԱԿ ԱՂԵՂ (ARC) */
        .acro-text::before {
            content: "";
            position: absolute;
            top: -35px;
            left: 50%;
            width: 110%;
            height: 70px;
            border-top: 5px solid #ffffff; /* ՍՊԻՏԱԿ ԱՂԵՂ */
            border-radius: 50%;
            transform: translateX(-50%) rotate(-5deg);
        }
    
        .sport-text {
            margin-top: 15px;
            font-size: 26px;
            letter-spacing: 16px;
            font-weight: 500;
            color: #ffffff; /* ՍՊԻՏԱԿ ՏԵՔՍՏ */
            text-indent: 16px;
            text-transform: uppercase;
        }
    
        /* ԳՐԱՆՑՄԱՆ ՖՈՐՄԱ */
        .container { 
            max-width: 460px; 
            width: 88%; 
            background: var(--card-bg); 
            padding: 40px; 
            margin: -50px 0 50px 0; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            border: 1px solid #252525;
            z-index: 10;
        }
    
        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: var(--accent); 
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
    
        .form-group { margin-bottom: 22px; }
    
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: bold; 
            font-size: 13px; 
            color: var(--text-muted);
            text-transform: uppercase;
        }
    
        input, select { 
            width: 100%; 
            padding: 15px; 
            background-color: #222;
            border: 2px solid #333; 
            border-radius: 14px; 
            color: white;
            font-size: 16px; 
            transition: 0.3s;
        }
    
        input:focus, select:focus { 
            border-color: var(--accent); 
            background-color: #2a2a2a;
            outline: none;
        }
    
        button { 
            width: 100%; 
            background: linear-gradient(135deg, #ffcc00 0%, #ffaa00 100%);
            color: #000; 
            border: none; 
            padding: 20px; 
            border-radius: 14px; 
            font-size: 19px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.4s; 
            margin-top: 15px; 
        }
    
        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3);
        }
    
        .admin-link { 
            margin-top: 30px; 
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 13px; 
            border: 1px solid #222;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 50px;
        }
    

        /* ՆԿԱՐԻ ԿԼՈՐԱՑՈՒՄ */
        .preview-container { 
            text-align: center; 
            margin-top: 15px; 
            display: none; 
        }

        #photo-preview { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--accent); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            margin: 0 auto 10px auto;
        }
        /* RESPONSIVE */
        @media (max-width: 480px) {
            header { padding: 40px 0 60px 0; }
            .acro-text { font-size: 52px; letter-spacing: 6px; }
            .acro-text::before { top: -20px; height: 40px; border-top-width: 3px; }
            .sport-text { font-size: 17px; letter-spacing: 10px; text-indent: 10px; }
            .container { margin-top: -40px; padding: 25px; }
        }
    </style>
    </head>
<body>

    <header>
        <div class="logo-container">
            <div class="acro-text">ACRO</div>
            <div class="sport-text">SPORT</div>
        </div>
    </header>
    <div class="container">
        <h2>Երեխայի Գրանցում</h2>
        <form id="registration-form">
            <div class="form-group">
                <label>Ծնողի Անուն Ազգանուն</label>
                <input type="text" id="parent-name" placeholder="Օր.՝ Արմեն Պետրոսյան" required>
            </div>
            <div class="form-group">
                <label>Երեխայի Անուն Ազգանուն</label>
                <input type="text" id="child-name" placeholder="Օր.՝ Անի Պետրոսյան" required>
            </div>
            <div class="form-group">
                <label>Երեխայի Տարիքը</label>
                <input type="number" id="child-age" min="4" placeholder="Տարիքը" required>
            </div>
            <div class="form-group">
                <label>Հեռախոսահամար</label>
                <input type="tel" id="phone" placeholder="094XXXXXX" required>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Օրը</label>
                    <select id="visit-day" required>
                        <option value="Երկուշաբթի">Երկուշաբթի</option>
                        <option value="Չորեքշաբթի">Չորեքշաբթի</option>
                        <option value="Ուրբաթ">Ուրբաթ</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Ժամը</label>
                    <select id="visit-time" required>
                        <option value="15:00">15:00</option               
                        <option value="17:30">17:30</option>
          
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Ո՞ր մարզադահլիճն եք նախընտրում</label>
                <select id="gym-location" required>
                    <option value="Դավթաշեն">Դավթաշեն </option>
                    <option value="Այգեկ">Այգեկ </option>
                    <option value="Նոր Գեղի">Նոր Գեղի </option>
                </select>
            </div>

            <div class="form-group">
                <label>Երեխայի լուսանկարը</label>
                <input type="file" id="child-photo" accept="image/*">
                <div id="preview-box" class="preview-container">
                    <img id="photo-preview" src="">
                    <p style="font-size: 12px; color: #28a745;">Նկարը պատրաստ է</p>
                </div>
            </div>

            <button type="submit" id="submit-btn">Ուղարկել Հայտը</button>
        </form>
    </div>

    <a href="admin.html" class="admin-btn">Մուտք Ադմին</a>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsOaBKfyOfLkCq8rX6tKaaRMLIdLS4w0Y",
            authDomain: "acrosport-bdd97.firebaseapp.com",
            projectId: "acrosport-bdd97",
            databaseURL: "https://acrosport-bdd97-default-rtdb.firebaseio.com",
            storageBucket: "acrosport-bdd97.firebasestorage.app",
            messagingSenderId: "23545482019",
            appId: "1:23545482019:web:055ec5ff5183264852da96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        emailjs.init("AuU5y72Z9N4khQdVy");

        // ԱՎՏՈՄԱՏ ԺԱՄԻ ՓՈՓՈԽՈՒԹՅՈՒՆ
        const gymSelect = document.getElementById('gym-location');
        const timeSelect = document.getElementById('visit-time');

        gymSelect.addEventListener('change', function() {
            if (this.value === "Այգեկ" || this.value === "Նոր Գեղի") {
                timeSelect.value = "15:00";
            } else if (this.value === "Դավթաշեն") {
                timeSelect.value = "17:30";
            }
        });

        // Նկարի Preview-ի տրամաբանությունը
        document.getElementById('child-photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('photo-preview').src = event.target.result;
                    document.getElementById('preview-box').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    };
                };
            });
        }

        document.getElementById('registration-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "Ուղարկվում է...";

            const file = document.getElementById('child-photo').files[0];
            let photoBase64 = "";

            if (file) {
                photoBase64 = await compressImage(file);
            }

            const formData = {
                parent_name: document.getElementById('parent-name').value,
                child_name: document.getElementById('child-name').value,
                child_age: document.getElementById('child-age').value,
                phone: document.getElementById('phone').value,
                visit_day: document.getElementById('visit-day').value,
                visit_time: document.getElementById('visit-time').value,
                gym_location: document.getElementById('gym-location').value,
                child_photo: photoBase64,
                timestamp: new Date().toLocaleString()
            };

            push(ref(db, 'registrations'), formData)
                .then(() => {
                    const emailData = { ...formData };
                    delete emailData.child_photo;
                    return emailjs.send('service_xjbr5cd', 'template_qqx01iq', emailData);
                })
                .then(() => {
                    alert("Հայտը հաջողությամբ ուղարկվեց:");
                    document.getElementById('registration-form').reset();
                    document.getElementById('preview-box').style.display = 'none';
                })
                .catch((err) => {
                    console.error(err);
                    alert("Սխալ տեղի ունեցավ:");
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = "Ուղարկել Հայտը";
                });
        });
    </script>
</body>
</html>
